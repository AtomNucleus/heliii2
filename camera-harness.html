<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera Collision Visual Harness</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #061018; }
      #game-canvas { width: 100%; height: 100%; display: block; }
      .panel {
        position: fixed; top: 18px; left: 18px; width: min(390px, calc(100vw - 36px));
        padding: 14px 16px; border: 1px solid #58e6d9; border-radius: 12px;
        background: rgba(4, 15, 22, .88); box-shadow: 0 12px 42px #0009;
        backdrop-filter: blur(10px); pointer-events: none;
      }
      .eyebrow { color: #58e6d9; font-size: 11px; font-weight: 800; letter-spacing: .16em; }
      h1 { margin: 5px 0 8px; font-size: 19px; }
      #harness-status { color: #c9d8df; font: 12px/1.45 ui-monospace, monospace; white-space: pre-line; }
      .legend { margin-top: 10px; display: flex; gap: 12px; color: #9cb0b9; font-size: 11px; }
      .dot::before { content: ""; display: inline-block; width: 8px; height: 8px; margin-right: 5px; border-radius: 50%; background: var(--c); }
    </style>
  </head>
  <body>
    <main id="app" data-harness-ready="0">
      <canvas id="game-canvas"></canvas>
      <section class="panel">
        <div class="eyebrow">DETERMINISTIC VISUAL TEST</div>
        <h1>Chase Camera Collision</h1>
        <div id="harness-status">INITIALIZING…</div>
        <div class="legend">
          <span class="dot" style="--c:#59e6da">helicopter</span>
          <span class="dot" style="--c:#ff9c58">camera</span>
          <span class="dot" style="--c:#ff315f">collision</span>
        </div>
      </section>
    </main>
    <script type="module" src="/src/debug/cameraCollisionHarness.ts"></script>
  </body>
</html>
