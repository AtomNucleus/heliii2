<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphics and VFX Visual Harness</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #071018; }
      #game-canvas { width: 100%; height: 100%; display: block; }
      .panel {
        position: fixed; top: 18px; right: 18px; width: min(370px, calc(100vw - 36px));
        padding: 14px 16px; border: 1px solid #ffad69; border-radius: 12px;
        background: rgba(7, 15, 23, .88); box-shadow: 0 12px 42px #0009;
        backdrop-filter: blur(10px); pointer-events: none;
      }
      .eyebrow { color: #ffad69; font-size: 11px; font-weight: 800; letter-spacing: .16em; }
      h1 { margin: 5px 0 8px; font-size: 19px; }
      #harness-status { color: #d4dee4; font: 12px/1.45 ui-monospace, monospace; white-space: pre-line; }
    </style>
  </head>
  <body>
    <main id="app" data-harness-ready="0">
      <canvas id="game-canvas"></canvas>
      <section class="panel">
        <div class="eyebrow">DETERMINISTIC VISUAL TEST</div>
        <h1>Graphics &amp; Combat VFX</h1>
        <div id="harness-status">INITIALIZING…</div>
      </section>
    </main>
    <script type="module" src="/src/debug/vfxHarness.ts"></script>
  </body>
</html>
